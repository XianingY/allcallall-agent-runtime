[project]
name = "allcallall-agent-runtime-sdk"
version = "0.1.0"
description = "Typed Python SDK for AllCallAll Agent and RAG runtimes"
requires-python = ">=3.11"
dependencies = [
  "allcallall-shared>=0.1.0",
  "httpx>=0.27,<1",
  "pydantic>=2.7,<3",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.10,<2",
  "pytest>=8.2,<9",
  "ruff>=0.5,<1",
]

[tool.setuptools.packages.find]
include = ["allcallall_agent_runtime_sdk*"]

[tool.uv.sources]
allcallall-shared = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]
mypy_path = "../shared"
