name: Publish Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Agent Runtime
        run: |
          docker build \
            -f services/agent-runtime/Dockerfile \
            -t ghcr.io/xianingy/allcallall-agent-runtime/agent-runtime:${GITHUB_REF_NAME} \
            -t ghcr.io/xianingy/allcallall-agent-runtime/agent-runtime:latest \
            .
          docker push ghcr.io/xianingy/allcallall-agent-runtime/agent-runtime:${GITHUB_REF_NAME}
          docker push ghcr.io/xianingy/allcallall-agent-runtime/agent-runtime:latest
      - name: Build and push RAG Runtime
        run: |
          docker build \
            -f services/rag-runtime/Dockerfile \
            -t ghcr.io/xianingy/allcallall-agent-runtime/rag-runtime:${GITHUB_REF_NAME} \
            -t ghcr.io/xianingy/allcallall-agent-runtime/rag-runtime:latest \
            .
          docker push ghcr.io/xianingy/allcallall-agent-runtime/rag-runtime:${GITHUB_REF_NAME}
          docker push ghcr.io/xianingy/allcallall-agent-runtime/rag-runtime:latest

